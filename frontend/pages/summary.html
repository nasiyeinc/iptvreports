<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasiye | Summary</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="layout">
    <div id="sidebar-container"></div>
    <div class="main">
        <h2><i class="fas fa-chart-bar"></i> Summary Dashboard <span class="view-only-badge"><i class="fas fa-eye"></i> View Only</span></h2>
        
        <div class="date-filter-card">
            <div class="filter-title">Date Range Filter</div>
            <div class="filter-row">
                <div class="filter-group"><label>Start Date</label><input type="date" id="startDate" class="date-input"></div>
                <div class="filter-group"><label>End Date</label><input type="date" id="endDate" class="date-input"></div>
                <button class="filter-btn" id="applyFilterBtn">Apply Filter</button>
                <button class="filter-btn reset-btn" id="resetFilterBtn">Reset</button>
            </div>
        </div>

        <div class="stats-grid" id="summaryStats">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-users"></i></div>
                <div>
                    <div class="stat-label">Total Customers</div>
                    <div class="stat-value" id="totalCustomers">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-tv"></i></div>
                <div>
                    <div class="stat-label">Total Reports</div>
                    <div class="stat-value" id="totalReports">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-stream"></i></div>
                <div>
                    <div class="stat-label">Unique Streams</div>
                    <div class="stat-value" id="uniqueStreams">0</div>
                </div>
            </div>
        </div>

        <div class="charts-row">
            <div class="chart-card"><h4>Customers by Xarunta</h4><div id="xaruntaStats">Loading...</div></div>
            <div class="chart-card"><h4>Daily Report Activity</h4><canvas id="dailyChart" height="250"></canvas></div>
        </div>
    </div>
</div>
<script src="/js/app.js"></script>
<script>
    loadSidebar();
    
    async function loadSummary() {
        const startDate = document.getElementById('startDate')?.value;
        const endDate = document.getElementById('endDate')?.value;
        let url = `${API_BASE}/summary`;
        if (startDate && endDate) url += `?startDate=${startDate}&endDate=${endDate}`;
        
        const response = await fetch(url);
        const data = await response.json();
        
        document.getElementById('totalCustomers').innerText = data.totalCustomers || '0';
        document.getElementById('totalReports').innerText = data.totalIPTVReports || '0';
        document.getElementById('uniqueStreams').innerText = data.uniqueStreams || '0';
        
        const xaruntaDiv = document.getElementById('xaruntaStats');
        if (xaruntaDiv && data.xaruntaStats) {
            xaruntaDiv.innerHTML = data.xaruntaStats.map(s => `<div style="display: flex; justify-content: space-between; padding: 0.5rem;"><span>${s._id}</span><strong>${s.count}</strong></div>`).join('');
        }
        
        if (data.dailyStats) {
            const ctx = document.getElementById('dailyChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.dailyStats.map(d => d._id),
                    datasets: [{ label: 'Daily Reports', data: data.dailyStats.map(d => d.count), borderColor: '#8b5cf6', fill: true }]
                }
            });
        }
    }
    
    const applyBtn = document.getElementById('applyFilterBtn');
    const resetBtn = document.getElementById('resetFilterBtn');
    if (applyBtn) applyBtn.onclick = loadSummary;
    if (resetBtn) resetBtn.onclick = () => { document.getElementById('startDate').value = ''; document.getElementById('endDate').value = ''; loadSummary(); };
    
    loadSummary();
</script>
</body>
</html>
