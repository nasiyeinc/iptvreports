<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Nasiye | Role Access Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .premium-modal {
            background: white;
            border-radius: 32px;
            width: 90%;
            max-width: 550px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.4s ease;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
        }
        
        .premium-modal::-webkit-scrollbar {
            width: 6px;
        }
        
        .premium-modal::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        .premium-modal::-webkit-scrollbar-thumb {
            background: #6366f1;
            border-radius: 10px;
        }
        
        .modal-header-premium {
            background: #6366f1;
            color: white;
            padding: 1.8rem 2rem;
            border-radius: 32px 32px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header-premium h3 {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .modal-header-premium h3 i {
            font-size: 1.8rem;
        }
        
        .close-modal-premium {
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.2s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
        }
        
        .close-modal-premium:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(90deg);
        }
        
        .modal-body {
            padding: 2rem;
        }
        
        .form-group-premium {
            margin-bottom: 1.5rem;
        }
        
        .form-group-premium label {
            display: block;
            margin-bottom: 0.6rem;
            font-weight: 700;
            color: #1e293b;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .form-group-premium label i {
            margin-right: 8px;
            color: #6366f1;
            width: 20px;
        }
        
        .form-control-premium {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 0.95rem;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        
        .form-control-premium:focus {
            border-color: #6366f1;
            outline: none;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        .form-control-premium:read-only {
            background: #f8fafc;
            cursor: not-allowed;
        }
        
        .modal-footer {
            padding: 1.5rem 2rem;
            background: #f8fafc;
            border-radius: 0 0 32px 32px;
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }
        
        /* Action Buttons Container */
        .action-buttons-container {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        /* Premium Button Styles */
        .btn-premium {
            padding: 0.9rem 1.8rem;
            border: none;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.5px;
        }
        
        .btn-add-premium {
            background: #10b981;
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        
        .btn-add-premium:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
        }
        
        /* Search Bar Premium */
        .search-wrapper-premium {
            background: white;
            padding: 1.5rem;
            border-radius: 24px;
            margin-bottom: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            position: relative;
        }
        
        .search-icon-premium {
            position: absolute;
            left: 2.5rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1.1rem;
            pointer-events: none;
        }
        
        .search-input-premium {
            width: 100%;
            padding: 1rem 1.2rem 1rem 3rem;
            border: 2px solid #e2e8f0;
            border-radius: 60px;
            font-size: 0.95rem;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        
        .search-input-premium:focus {
            border-color: #6366f1;
            outline: none;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        /* Premium Table - Using #6366f1 */
        .premium-table-wrapper {
            background: white;
            border-radius: 24px;
            overflow-x: auto;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }
        
        .premium-table {
            width: 100%;
            min-width: 600px;
            border-collapse: collapse;
        }
        
        .premium-table thead {
            background: #6366f1;
            color: white;
        }
        
        .premium-table th {
            padding: 1.2rem 1rem;
            text-align: left;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        
        .premium-table td {
            padding: 1rem;
            border-bottom: 1px solid #e2e8f0;
            font-size: 0.9rem;
        }
        
        .premium-table tbody tr {
            transition: all 0.2s;
        }
        
        .premium-table tbody tr:hover {
            background: #f8fafc;
        }
        
        /* Role Badges */
        .role-badge-premium {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        
        .role-admin-premium {
            background: #ef4444;
            color: white;
            box-shadow: 0 2px 8px rgba(239, 68, 68, 0.3);
        }
        
        .role-normal-premium {
            background: #10b981;
            color: white;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
        }
        
        /* Edit Button Premium */
        .edit-btn-premium {
            background: #6366f1;
            border: none;
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 700;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .edit-btn-premium:hover {
            background: #4f46e5;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }
        
        /* Buttons in Modal */
        .btn-primary-premium {
            background: #6366f1;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary-premium:hover {
            background: #4f46e5;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }
        
        .btn-secondary-premium {
            background: #64748b;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-secondary-premium:hover {
            background: #475569;
            transform: translateY(-2px);
        }
        
        /* Loading Animation */
        .loading-premium {
            text-align: center;
            padding: 3rem;
        }
        
        .spinner-premium {
            width: 50px;
            height: 50px;
            border: 3px solid #e2e8f0;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Empty State */
        .empty-state-premium {
            text-align: center;
            padding: 4rem;
            background: white;
            border-radius: 24px;
        }
        
        .empty-icon-premium {
            font-size: 4rem;
            color: #cbd5e1;
            margin-bottom: 1rem;
        }
        
        .empty-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }
        
        /* Toast Notification */
        .toast-notification {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: white;
            border-radius: 16px;
            padding: 1rem 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 3000;
            animation: slideInRight 0.3s ease;
            border-left: 4px solid #10b981;
        }
        
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .toast-success {
            border-left-color: #10b981;
        }
        
        .toast-error {
            border-left-color: #ef4444;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .premium-table th, .premium-table td {
                padding: 0.8rem 0.5rem;
                font-size: 0.75rem;
            }
            
            .edit-btn-premium {
                padding: 0.3rem 0.8rem;
                font-size: 0.7rem;
            }
            
            .modal-body {
                padding: 1.5rem;
            }
            
            .btn-premium {
                padding: 0.7rem 1.2rem;
                font-size: 0.8rem;
            }
            
            .action-buttons-container {
                flex-direction: column;
            }
            
            .btn-premium {
                width: 100%;
                justify-content: center;
            }
            
            .modal-header-premium h3 {
                font-size: 1.2rem;
            }
            
            .toast-notification {
                bottom: 1rem;
                right: 1rem;
                left: 1rem;
                font-size: 0.85rem;
            }
        }
        
        /* Table Footer */
        .table-footer-premium {
            margin-top: 1rem;
            padding: 1rem;
            text-align: center;
            color: #64748b;
            font-size: 0.85rem;
        }
        
        /* Small screens */
        @media (max-width: 480px) {
            .premium-table-wrapper {
                border-radius: 16px;
            }
            
            .search-wrapper-premium {
                padding: 1rem;
            }
            
            .search-input-premium {
                padding: 0.8rem 1rem 0.8rem 2.5rem;
                font-size: 0.85rem;
            }
            
            .search-icon-premium {
                left: 1.8rem;
                font-size: 0.9rem;
            }
            
            .modal-header-premium {
                padding: 1.2rem 1.5rem;
            }
            
            .modal-body {
                padding: 1.2rem;
            }
            
            .form-control-premium {
                padding: 0.7rem 0.9rem;
                font-size: 0.85rem;
            }
        }
        
        /* Validation Error Styles */
        .form-control-premium.error {
            border-color: #ef4444;
            background-color: #fef2f2;
        }
        
        .error-message {
            color: #ef4444;
            font-size: 0.75rem;
            margin-top: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        
        .error-message i {
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
<div class="layout">
    <div id="sidebar-container"></div>
    <div class="main">
        <!-- Header -->
        <div class="dashboard-header">
            <h2><i class="fas fa-users-gear"></i> Role Access Management</h2>
            <div class="user-watermark">
                <i class="fas fa-fingerprint"></i>
                <span id="watermarkName">Loading...</span>
                <i class="fas fa-shield-alt"></i>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons-container">
            <button class="btn-premium btn-add-premium" id="addUserBtn">
                <i class="fas fa-user-plus"></i> Add New User
            </button>
        </div>

        <!-- Search Bar -->
        <div class="search-wrapper-premium">
            <i class="fas fa-search search-icon-premium"></i>
            <input type="text" id="searchInput" class="search-input-premium" placeholder="Search users by username or mobile number...">
        </div>

        <!-- Users Table -->
        <div id="usersTableContainer">
            <div class="loading-premium">
                <div class="spinner-premium"></div>
                <p>Loading users...</p>
            </div>
        </div>
    </div>
</div>

<!-- Premium Modal for Add/Edit User -->
<div id="userModal" class="modal-overlay">
    <div class="premium-modal">
        <div class="modal-header-premium">
            <h3>
                <i class="fas fa-user-plus"></i>
                <span id="modalTitle">Add New User</span>
            </h3>
            <div class="close-modal-premium" onclick="closeModal()">
                <i class="fas fa-times"></i>
            </div>
        </div>
        <div class="modal-body">
            <form id="userForm">
                <input type="hidden" id="userId">
                <div class="form-group-premium">
                    <label><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" class="form-control-premium" placeholder="Enter username" required>
                    <div id="usernameError" class="error-message"></div>
                </div>
                <div class="form-group-premium">
                    <label><i class="fas fa-lock"></i> Password <span id="passwordRequired" style="color: #ef4444;">*</span></label>
                    <input type="password" id="password" class="form-control-premium" placeholder="Enter password">
                    <small id="passwordHint" style="color: #64748b; font-size: 0.7rem; display: none;">Leave blank to keep current password</small>
                    <div id="passwordError" class="error-message"></div>
                </div>
                <div class="form-group-premium">
                    <label><i class="fas fa-mobile-alt"></i> Mobile Number</label>
                    <input type="text" id="mobile" class="form-control-premium" placeholder="Enter mobile number">
                    <div id="mobileError" class="error-message"></div>
                </div>
                <div class="form-group-premium">
                    <label><i class="fas fa-tag"></i> User Role</label>
                    <select id="userType" class="form-control-premium" required>
                        <option value="normal">Normal User</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary-premium" onclick="closeModal()">
                <i class="fas fa-times"></i> Cancel
            </button>
            <button class="btn-primary-premium" onclick="saveUser()">
                <i class="fas fa-save"></i> Save User
            </button>
        </div>
    </div>
</div>

<script src="/js/app.js"></script>
<script>
    // Role Access Management - Clean UI with #6366f1
    (function() {
        let allUsers = [];
        const currentLoggedUser = localStorage.getItem("user") || "Admin";
        const currentUserRole = localStorage.getItem("role") || "normal";

        // Show toast notification
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast-notification toast-${type}`;
            const icon = type === 'success' ? 'fa-check-circle' : (type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle');
            toast.innerHTML = `
                <i class="fas ${icon}" style="font-size: 1.2rem; color: ${type === 'success' ? '#10b981' : (type === 'error' ? '#ef4444' : '#3b82f6')}"></i>
                <span>${message}</span>
            `;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Validation Functions
        function clearErrors() {
            const fields = ['username', 'password', 'mobile'];
            fields.forEach(field => {
                const input = document.getElementById(field);
                if (input) input.classList.remove('error');
                const errorDiv = document.getElementById(`${field}Error`);
                if (errorDiv) errorDiv.innerHTML = '';
            });
        }

        function validateUsername(username, userId = null) {
            if (!username || username.trim() === '') {
                return 'Username is required';
            }
            if (username.length < 3) {
                return 'Username must be at least 3 characters';
            }
            if (username.length > 30) {
                return 'Username must not exceed 30 characters';
            }
            if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                return 'Username can only contain letters, numbers, and underscores';
            }
            // Check for duplicate username
            const duplicate = allUsers.find(user => user.username.toLowerCase() === username.toLowerCase() && user._id !== userId);
            if (duplicate) {
                return 'Username already exists';
            }
            return null;
        }

        function validatePassword(password, isNewUser) {
            if (isNewUser && (!password || password.trim() === '')) {
                return 'Password is required for new users';
            }
            if (password && password.trim() !== '') {
                if (password.length < 4) {
                    return 'Password must be at least 4 characters';
                }
                if (password.length > 50) {
                    return 'Password must not exceed 50 characters';
                }
            }
            return null;
        }

        function validateMobile(mobile) {
            if (!mobile || mobile.trim() === '') {
                return null; // Mobile is optional
            }
            const mobileStr = mobile.trim();
            if (!/^\d+$/.test(mobileStr)) {
                return 'Mobile number must contain only digits';
            }
            if (mobileStr.length < 10) {
                return 'Mobile number must be at least 10 digits';
            }
            if (mobileStr.length > 15) {
                return 'Mobile number must not exceed 15 digits';
            }
            return null;
        }

        // Load users
        async function loadUsers() {
            const container = document.getElementById('usersTableContainer');
            try {
                const response = await fetch(`${API_BASE}/users`);
                if (!response.ok) throw new Error('Failed to load users');
                const users = await response.json();
                allUsers = users;
                renderUsersTable(users);
            } catch (error) {
                console.error("Error loading users:", error);
                container.innerHTML = `
                    <div class="empty-state-premium">
                        <div class="empty-icon-premium">
                            <i class="fas fa-exclamation-triangle"></i>
                        </div>
                        <div class="empty-title">Error Loading Users</div>
                        <p>${error.message}</p>
                        <button onclick="location.reload()" class="btn-primary-premium" style="margin-top: 1rem;">
                            <i class="fas fa-sync-alt"></i> Retry
                        </button>
                    </div>
                `;
            }
        }

        // Render users table
        function renderUsersTable(users) {
            const container = document.getElementById('usersTableContainer');
            
            if (!users || users.length === 0) {
                container.innerHTML = `
                    <div class="empty-state-premium">
                        <div class="empty-icon-premium">
                            <i class="fas fa-users-slash"></i>
                        </div>
                        <div class="empty-title">No Users Found</div>
                        <p>Click "Add New User" to create your first user.</p>
                    </div>
                `;
                return;
            }

            // Filter based on search
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let filteredUsers = users;
            if (searchTerm) {
                filteredUsers = users.filter(user => 
                    user.username.toLowerCase().includes(searchTerm) || 
                    (user.mobile && user.mobile.toLowerCase().includes(searchTerm))
                );
            }

            if (filteredUsers.length === 0) {
                container.innerHTML = `
                    <div class="empty-state-premium">
                        <div class="empty-icon-premium">
                            <i class="fas fa-search"></i>
                        </div>
                        <div class="empty-title">No Results Found</div>
                        <p>No users match your search criteria.</p>
                    </div>
                `;
                return;
            }

            let rowsHtml = '';
            filteredUsers.forEach(user => {
                const roleClass = user.type === 'admin' ? 'role-admin-premium' : 'role-normal-premium';
                const roleIcon = user.type === 'admin' ? '' : '';
                const roleLabel = user.type === 'admin' ? 'Administrator' : 'Normal User';
                
                rowsHtml += `
                    <tr>
                        <td style="font-weight: 600;">${escapeHtml(user.username)}</td>
                        <td>${escapeHtml(user.mobile || '—')}</td>
                        <td>
                            <span class="role-badge-premium ${roleClass}">
                                ${roleIcon} ${roleLabel}
                            </span>
                        </td>
                        <td>${new Date(user.actionDate).toLocaleDateString()}</td>
                        <td>
                            ${currentUserRole === 'admin' ? `
                                <button class="edit-btn-premium" onclick="openEditModal('${user._id}')">
                                    <i class="fas fa-edit"></i> Edit
                                </button>
                            ` : `
                                <span style="color:#94a3b8; font-size:0.75rem;">
                                    <i class="fas fa-eye"></i> View Only
                                </span>
                            `}
                        </td>
                    </tr>
                `;
            });

            const fullHtml = `
                <div class="premium-table-wrapper">
                    <table class="premium-table">
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Mobile</th>
                                <th>Role</th>
                                <th>Last Updated</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rowsHtml}
                        </tbody>
                    </table>
                </div>
                <div class="table-footer-premium">
                    <i class="fas fa-users"></i> Showing ${filteredUsers.length} of ${users.length} users
                </div>
            `;
            
            container.innerHTML = fullHtml;
        }

        // Escape HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Open Add Modal
        function openAddModal() {
            clearErrors();
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-plus"></i> Add New User';
            document.getElementById('userId').value = '';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('mobile').value = '';
            document.getElementById('userType').value = 'normal';
            document.getElementById('password').required = true;
            document.getElementById('passwordRequired').style.display = 'inline';
            document.getElementById('passwordHint').style.display = 'none';
            document.getElementById('userModal').style.display = 'flex';
        }

        // Open Edit Modal
        window.openEditModal = async function(userId) {
            try {
                const response = await fetch(`${API_BASE}/users/${userId}`);
                if (!response.ok) throw new Error('Failed to load user');
                const user = await response.json();
                
                clearErrors();
                document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-edit"></i> Edit User';
                document.getElementById('userId').value = user._id;
                document.getElementById('username').value = user.username;
                document.getElementById('mobile').value = user.mobile || '';
                document.getElementById('userType').value = user.type;
                document.getElementById('password').value = '';
                document.getElementById('password').required = false;
                document.getElementById('passwordRequired').style.display = 'none';
                document.getElementById('passwordHint').style.display = 'inline';
                
                document.getElementById('userModal').style.display = 'flex';
            } catch (error) {
                showToast('Error loading user: ' + error.message, 'error');
            }
        }

        // Close Modal
        window.closeModal = function() {
            document.getElementById('userModal').style.display = 'none';
            document.getElementById('userForm').reset();
            clearErrors();
        }

        // Save User (Add or Edit) with Validation
        window.saveUser = async function() {
            const userId = document.getElementById('userId').value;
            const isNewUser = !userId;
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const mobile = document.getElementById('mobile').value.trim();
            const userType = document.getElementById('userType').value;
            
            // Clear previous errors
            clearErrors();
            
            let isValid = true;
            
            // Validate Username
            const usernameError = validateUsername(username, userId);
            if (usernameError) {
                const usernameInput = document.getElementById('username');
                const usernameErrorDiv = document.getElementById('usernameError');
                usernameInput.classList.add('error');
                usernameErrorDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${usernameError}`;
                isValid = false;
            }
            
            // Validate Password
            const passwordError = validatePassword(password, isNewUser);
            if (passwordError) {
                const passwordInput = document.getElementById('password');
                const passwordErrorDiv = document.getElementById('passwordError');
                passwordInput.classList.add('error');
                passwordErrorDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${passwordError}`;
                isValid = false;
            }
            
            // Validate Mobile
            const mobileError = validateMobile(mobile);
            if (mobileError) {
                const mobileInput = document.getElementById('mobile');
                const mobileErrorDiv = document.getElementById('mobileError');
                mobileInput.classList.add('error');
                mobileErrorDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${mobileError}`;
                isValid = false;
            }
            
            // If validation fails, stop here
            if (!isValid) {
                return;
            }
            
            // Prepare user data
            const userData = {
                username: username,
                mobile: mobile,
                type: userType
            };
            
            if (password) {
                userData.password = password;
            }
            
            try {
                let response;
                if (userId) {
                    // Update existing user
                    response = await fetch(`${API_BASE}/users/${userId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(userData)
                    });
                } else {
                    // Create new user
                    if (!userData.password) {
                        showToast('Password is required for new users', 'error');
                        return;
                    }
                    response = await fetch(`${API_BASE}/users`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(userData)
                    });
                }
                
                if (response.ok) {
                    const result = await response.json();
                    showToast(result.msg || 'User saved successfully!', 'success');
                    closeModal();
                    loadUsers();
                } else {
                    const error = await response.json();
                    showToast('Error: ' + (error.msg || error.error), 'error');
                }
            } catch (error) {
                showToast('Error saving user: ' + error.message, 'error');
            }
        }

        // Search functionality with debounce
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                renderUsersTable(allUsers);
            }, 300);
        });

        // Add User Button
        document.getElementById('addUserBtn').addEventListener('click', openAddModal);

        // Check access
        if (currentUserRole !== 'admin') {
            const container = document.getElementById('usersTableContainer');
            container.innerHTML = `
                <div class="empty-state-premium">
                    <div class="empty-icon-premium">
                        <i class="fas fa-lock"></i>
                    </div>
                    <div class="empty-title">Access Denied</div>
                    <p>You don't have permission to access this page.</p>
                    <p style="font-size: 0.8rem; margin-top: 0.5rem;">Admin access required</p>
                </div>
            `;
            document.getElementById('addUserBtn').style.display = 'none';
            document.getElementById('searchInput').disabled = true;
        } else {
            loadUsers();
        }

        // Load sidebar
        if (typeof loadSidebar === 'function') {
            loadSidebar();
        }

        // Update watermark
        const watermarkSpan = document.getElementById('watermarkName');
        if (watermarkSpan) {
            watermarkSpan.innerHTML = `${currentLoggedUser} <span class="view-only-badge">${currentUserRole === 'admin' ? 'Admin' : 'User'}</span>`;
        }

        // Make functions global
        window.loadUsers = loadUsers;
    })();
</script>
</body>
</html>
